# Deploy Luna to Render (https://render.com) — no home PC required.
# 1. Push luna-avatar to GitHub
# 2. Render → New → Blueprint → connect repo
# 3. Set XAI_API_KEY in the dashboard
# 4. Add custom domain: telephanti.com + www.telephanti.com in Render dashboard
# 5. Squarespace DNS: A @ → 216.24.57.1, CNAME www → luna-ki77.onrender.com

services:
  - type: web
    name: luna
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: LUNA_CLOUD
        value: "1"
      - key: LUNA_HOST
        value: 0.0.0.0
      - key: LUNA_PUBLIC_URL
        value: https://telephanti.com
      - key: XAI_API_KEY
        sync: false
      - key: GROK_MODEL
        value: grok-3-mini
      - key: TTS_VOICE
        value: en-US-AriaNeural
      - key: LUNA_LIPSYNC
        value: "1"